<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>НДФЛ Калькулятор</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a40;
    --accent: #7c6af7;
    --accent2: #f76a8c;
    --accent3: #6af7c8;
    --text: #e8e8f0;
    --muted: #6a6a88;
    --white: #ffffff;
  }

  :root.light {
    --bg: #f4f4fa;
    --surface: #eaeaf4;
    --card: #ffffff;
    --border: #d4d4e8;
    --accent: #6355e0;
    --accent2: #e8406e;
    --accent3: #20c99a;
    --text: #1a1a2e;
    --muted: #8888aa;
    --white: #1a1a2e;
  }

  @media (prefers-color-scheme: light) {
    :root:not(.dark) {
      --bg: #f4f4fa;
      --surface: #eaeaf4;
      --card: #ffffff;
      --border: #d4d4e8;
      --accent: #6355e0;
      --accent2: #e8406e;
      --accent3: #20c99a;
      --text: #1a1a2e;
      --muted: #8888aa;
      --white: #1a1a2e;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glowing orbs */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: drift 15s ease-in-out infinite alternate;
  }

  @keyframes drift {
    from { transform: translate(0,0); }
    to { transform: translate(200px, 150px); }
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeDown 0.6s ease both;
  }

  .header .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(124,106,247,0.4);
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
    background: rgba(124,106,247,0.08);
  }

  .header h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--white) 0%, var(--accent) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .header p {
    color: var(--muted);
    font-size: 13px;
    font-weight: 300;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 5px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .tab {
    flex: 1;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .tab.active {
    background: var(--accent);
    color: var(--white);
    box-shadow: 0 4px 20px rgba(124,106,247,0.4);
  }

  .tab:not(.active):hover {
    color: var(--text);
    background: var(--card);
  }

  /* Input card */
  .input-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.2s ease both;
    position: relative;
    overflow: hidden;
  }

  .input-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0.6;
  }

  .input-label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .input-wrapper {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
  }

  .input-prefix {
    padding: 16px 18px;
    font-size: 16px;
    color: var(--muted);
    border-right: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    font-weight: 300;
  }

  .salary-input {
    flex: 1;
    padding: 16px 18px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.5px;
    width: 100%;
  }

  .salary-input::placeholder { color: var(--muted); font-weight: 300; }

  .input-suffix {
    padding: 16px 18px;
    font-size: 12px;
    color: var(--muted);
    border-left: 1px solid var(--border);
    white-space: nowrap;
  }

  .calc-btn {
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #5a4fd6);
    border: none;
    border-radius: 12px;
    color: var(--white);
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .calc-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .calc-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,106,247,0.5); }
  .calc-btn:hover::after { opacity: 1; }
  .calc-btn:active { transform: translateY(0); }

  /* Results */
  .results {
    display: none;
    animation: fadeUp 0.5s ease both;
  }

  .results.visible { display: block; }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }

  .result-card:hover { transform: translateY(-2px); border-color: rgba(124,106,247,0.4); }

  .result-card.highlight {
    border-color: rgba(124,106,247,0.5);
    background: linear-gradient(135deg, rgba(124,106,247,0.1), var(--card));
  }

  .result-card.highlight::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .result-card.danger {
    border-color: rgba(247,106,140,0.3);
    background: linear-gradient(135deg, rgba(247,106,140,0.06), var(--card));
  }

  .result-card.danger::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), #f7a06a);
  }

  .result-card.success {
    border-color: rgba(106,247,200,0.3);
    background: linear-gradient(135deg, rgba(106,247,200,0.05), var(--card));
  }

  .result-card.success::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent3), #6af7f0);
  }

  .result-card.info {
    border-color: rgba(106,180,247,0.3);
    background: linear-gradient(135deg, rgba(106,180,247,0.06), var(--card));
  }

  .result-card.info::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #6ab4f7, #6a8ef7);
  }

  .result-card.info2 {
    border-color: rgba(124,247,160,0.3);
    background: linear-gradient(135deg, rgba(124,247,160,0.05), var(--card));
  }

  .result-card.info2::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #7cf7a0, #6af7c8);
  }

  .result-card.danger2 {
    border-color: rgba(247,160,106,0.3);
    background: linear-gradient(135deg, rgba(247,160,106,0.06), var(--card));
  }

  .result-card.danger2::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #f7a06a, #f7c86a);
  }

  .result-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 400;
  }

  .result-value {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(18px, 3vw, 24px);
    font-weight: 700;
    color: var(--white);
    letter-spacing: -1px;
    line-height: 1;
  }

  .result-value .currency {
    font-size: 12px;
    font-weight: 300;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0;
    margin-left: 4px;
  }

  /* Tax breakdown bar */
  .breakdown-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .breakdown-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .bar-container {
    height: 10px;
    background: var(--surface);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 14px;
    display: flex;
  }

  .bar-net {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 10px 0 0 10px;
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .bar-tax {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), #f7a06a);
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .bar-legend {
    display: flex;
    gap: 24px;
    font-size: 11px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-dot.net { background: var(--accent); }
  .legend-dot.tax { background: var(--accent2); }

  /* Tax brackets */
  .brackets-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
  }

  .brackets-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .bracket-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    gap: 16px;
    transition: opacity 0.3s;
  }

  .bracket-row:last-child { border-bottom: none; }
  .bracket-row.inactive { opacity: 0.3; }

  .bracket-rate {
    font-family: 'Unbounded', sans-serif;
    font-size: 16px;
    font-weight: 700;
    min-width: 48px;
    color: var(--accent);
  }

  .bracket-row.inactive .bracket-rate { color: var(--muted); }

  .bracket-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--surface);
    border-radius: 6px;
    overflow: hidden;
  }

  .bracket-bar-fill {
    height: 100%;
    border-radius: 6px;
    width: 0;
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .bracket-amount {
    font-size: 12px;
    color: var(--muted);
    min-width: 80px;
    text-align: right;
  }

  .bracket-range {
    font-size: 10px;
    color: var(--muted);
    min-width: 100px;
    text-align: right;
    letter-spacing: 0.3px;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .bracket-range { display: none; }
    .tabs { flex-direction: column; }
  }

  .orb2 {
    position: fixed;
    bottom: -100px;
    right: -100px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(247,106,140,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: all 0.2s ease;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  .theme-toggle:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 20px rgba(124,106,247,0.25);
    transform: translateY(-1px);
  }

  .icon-sun { display: none; }
  .icon-moon { display: block; }

  :root.light .icon-sun { display: block; }
  :root.light .icon-moon { display: none; }

  @media (prefers-color-scheme: light) {
    :root:not(.dark) .icon-sun { display: block; }
    :root:not(.dark) .icon-moon { display: none; }
  }
</style>
</head>
<body>
<div class="orb2"></div>
<button class="theme-toggle" id="theme-toggle" title="Переключить тему">
  <span class="icon-sun">☀️</span>
  <span class="icon-moon">🌙</span>
</button>
<div class="container">

  <div class="header">
    <div class="badge">Налог · 2026</div>
    <h1>НДФЛ<br>Калькулятор</h1>
    <p>Прогрессивная шкала налогообложения</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setMode(1)">Оклад → На руки</button>
    <button class="tab" onclick="setMode(2)">На руки → Оклад</button>
  </div>

  <div class="input-card">
    <label class="input-label" id="input-label">Оклад до налогов (в месяц)</label>
    <div class="input-wrapper">
      <span class="input-prefix">₽</span>
      <input class="salary-input" id="salary-input" type="text" inputmode="numeric" placeholder="200 000">
      <span class="input-suffix">в месяц</span>
    </div>

  </div>

  <div class="results" id="results">
    <div class="results-grid" id="results-grid"></div>

    <div class="breakdown-card">
      <div class="breakdown-title">Распределение дохода</div>
      <div class="bar-container">
        <div class="bar-net" id="bar-net"></div>
        <div class="bar-tax" id="bar-tax"></div>
      </div>
      <div class="bar-legend">
        <div class="legend-item">
          <div class="legend-dot net"></div>
          <span id="legend-net-pct">—</span> на руки
        </div>
        <div class="legend-item">
          <div class="legend-dot tax"></div>
          <span id="legend-tax-pct">—</span> налог
        </div>
      </div>
    </div>

    <div class="brackets-card">
      <div class="brackets-title">Налоговые ступени</div>
      <div id="brackets-list"></div>
    </div>
  </div>

</div>

<script>
const BRACKETS = [
  { rate: 0.13, label: '13%', from: 0,          to: 2_400_000,  color: '#7c6af7' },
  { rate: 0.15, label: '15%', from: 2_400_000,  to: 5_000_000,  color: '#9a6af7' },
  { rate: 0.18, label: '18%', from: 5_000_000,  to: 20_000_000, color: '#c46af7' },
  { rate: 0.20, label: '20%', from: 20_000_000, to: 50_000_000, color: '#f76ac4' },
  { rate: 0.22, label: '22%', from: 50_000_000, to: Infinity,   color: '#f76a8c' },
];

let mode = 1;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === m - 1));
  document.getElementById('input-label').textContent =
    m === 1 ? 'Оклад до налогов (в месяц)' : 'Желаемая зарплата на руки (в месяц)';
  document.getElementById('salary-input').placeholder = m === 1 ? '200 000' : '170 000';
  document.getElementById('salary-input').value = '';
  document.getElementById('results').classList.remove('visible');
}

function calculateNdfl(yearIncome) {
  let tax = 0;
  const details = [];
  for (const b of BRACKETS) {
    if (yearIncome <= b.from) { details.push({ ...b, taxable: 0, tax: 0 }); continue; }
    const taxable = Math.min(yearIncome, b.to === Infinity ? yearIncome : b.to) - b.from;
    const t = taxable * b.rate;
    tax += t;
    details.push({ ...b, taxable, tax: t });
  }
  return { tax, details };
}

function grossToNet(monthly) {
  const yearly = monthly * 12;
  const { tax, details } = calculateNdfl(yearly);
  return { monthly, monthlyNet: (yearly - tax) / 12, monthlyTax: tax / 12, yearlyNet: yearly - tax, yearlyTax: tax, dailyNet: (yearly - tax) / 12 / 21, details };
}

function netToGross(targetNet) {
  let lo = 0, hi = 100_000_000;
  while (hi - lo > 1) {
    const mid = Math.floor((lo + hi) / 2);
    if (grossToNet(mid).monthlyNet < targetNet) lo = mid; else hi = mid;
  }
  return hi;
}

function fmt(n) {
  return Math.round(n).toLocaleString('ru-RU');
}

function calculate() {
  const val = getRawValue();
  if (!val || val <= 0) return;

  let data;
  if (mode === 1) {
    data = grossToNet(val);
  } else {
    const gross = netToGross(val);
    data = grossToNet(gross);
  }

  const { monthly, monthlyNet, monthlyTax, yearlyNet, yearlyTax, dailyNet, details } = data;

  // Results grid
  const netPct = (monthlyNet / monthly * 100).toFixed(1);
  const taxPct = (monthlyTax / monthly * 100).toFixed(1);

  const cards = [
    { label: 'Зарплата на руки', value: fmt(monthlyNet), cls: 'highlight' },
    { label: 'Налог в месяц', value: fmt(monthlyTax), cls: 'danger' },
    { label: 'Оклад до налогов', value: fmt(monthly), cls: 'info' },
    { label: 'Среднедневной доход', value: fmt(dailyNet), cls: 'success' },
    { label: 'На руки за год', value: fmt(yearlyNet), cls: 'info2' },
    { label: 'Налогов за год', value: fmt(yearlyTax), cls: 'danger2' },
  ];

  document.getElementById('results-grid').innerHTML = cards.map(c => `
    <div class="result-card ${c.cls}">
      <div class="result-label">${c.label}</div>
      <div class="result-value">${c.value}<span class="currency">₽</span></div>
    </div>
  `).join('');

  // Bar
  document.getElementById('bar-net').style.width = netPct + '%';
  document.getElementById('bar-tax').style.width = taxPct + '%';
  document.getElementById('legend-net-pct').textContent = netPct + '%';
  document.getElementById('legend-tax-pct').textContent = taxPct + '%';

  // Brackets
  const maxTax = Math.max(...details.map(d => d.tax), 1);
  const yearlyGross = monthly * 12;
  document.getElementById('brackets-list').innerHTML = details.map(d => {
    const active = d.taxable > 0;
    const fillW = active ? Math.min((d.tax / maxTax) * 100, 100) : 0;
    const rangeStr = d.to === Infinity ? `от ${fmt(d.from / 1e6)}M` : `${fmt(d.from / 1e6)}M — ${fmt(d.to / 1e6)}M`;
    return `
      <div class="bracket-row ${active ? '' : 'inactive'}">
        <div class="bracket-rate" style="color:${d.color}">${d.label}</div>
        <div class="bracket-bar-wrap">
          <div class="bracket-bar-fill" style="background:${d.color};width:${fillW}%"></div>
        </div>
        <div class="bracket-amount">${active ? fmt(d.tax / 12) + ' ₽/мес' : '—'}</div>
        <div class="bracket-range">${rangeStr}</div>
      </div>`;
  }).join('');

  document.getElementById('results').classList.add('visible');
}

// Theme toggle
const root = document.documentElement;
const toggleBtn = document.getElementById('theme-toggle');
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');

function getSystemTheme() { return prefersDark.matches ? 'dark' : 'light'; }

toggleBtn.addEventListener('click', () => {
  const current = root.classList.contains('light') ? 'light'
    : root.classList.contains('dark') ? 'dark'
    : getSystemTheme();
  if (current === 'dark') {
    root.classList.remove('dark');
    root.classList.add('light');
  } else {
    root.classList.remove('light');
    root.classList.add('dark');
  }
});

// Input formatting and calculation
const inputEl = document.getElementById('salary-input');

function getRawValue() {
  return parseFloat(inputEl.value.replace(/\s/g, '')) || 0;
}

inputEl.addEventListener('input', () => {
  const raw = inputEl.value.replace(/\s/g, '').replace(/[^\d]/g, '');
  const num = parseInt(raw, 10);
  const cursor = inputEl.selectionStart;
  const oldLen = inputEl.value.length;

  if (raw === '') {
    inputEl.value = '';
    document.getElementById('results').classList.remove('visible');
    return;
  }

  const formatted = num.toLocaleString('ru-RU');
  inputEl.value = formatted;

  // Adjust cursor position accounting for added spaces
  const newLen = formatted.length;
  const diff = newLen - oldLen;
  inputEl.setSelectionRange(cursor + diff, cursor + diff);

  calculate();
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') calculate();
});
</script>
</body>
</html>
